{% extends "base.html" %}
{% block title %}Ajouter un utilisateur{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Ajouter un utilisateur</h1>
  <a href="{{ url_for('users') }}" class="btn btn-secondary">← Retour</a>
</div>

<div class="card card-narrow">
  <form method="POST" class="form-stack">
    <div class="form-group">
      <label for="ad_login">Login Active Directory <span class="required">*</span></label>
      <input type="text" id="ad_login" name="ad_login"
             value="{{ form.get('ad_login','') }}"
             placeholder="jdupont" required autofocus>
      <small class="hint">Identifiant Windows de l'utilisateur (en minuscules)</small>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="prenom">Prénom <span class="required">*</span></label>
        <input type="text" id="prenom" name="prenom"
               value="{{ form.get('prenom','') }}"
               placeholder="Jean" required>
      </div>
      <div class="form-group">
        <label for="nom">Nom <span class="required">*</span></label>
        <input type="text" id="nom" name="nom"
               value="{{ form.get('nom','') }}"
               placeholder="DUPONT" required>
      </div>
    </div>

    <div class="form-group">
      <label for="email">Adresse email <span class="required">*</span></label>
      <input type="email" id="email" name="email"
             value="{{ form.get('email','') }}"
             placeholder="j.dupont@maboite.fr" required>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Créer l'utilisateur</button>
      <a href="{{ url_for('users') }}" class="btn btn-secondary">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
