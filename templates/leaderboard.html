<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberScore — Classement</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0A1628;
      color: #FFFFFF;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Header */
    .lb-header {
      text-align: center;
      padding: 40px 20px 20px;
    }
    .lb-shield { font-size: 3rem; }
    .lb-title {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: #FFFFFF;
      text-transform: uppercase;
    }
    .lb-subtitle {
      font-size: 1rem;
      color: #7FAACC;
      margin-top: 4px;
      letter-spacing: 2px;
    }
    .lb-updated {
      font-size: 0.8rem;
      color: #446688;
      margin-top: 8px;
    }

    /* Podium Top 3 */
    .podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 24px;
      padding: 40px 20px 20px;
    }
    .podium-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .podium-avatar {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.4rem;
      color: #0A1628;
    }
    .podium-name {
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      max-width: 120px;
    }
    .podium-score {
      font-size: 1.4rem;
      font-weight: 700;
    }
    .podium-niveau {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .podium-block {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: #0A1628;
      border-radius: 4px 4px 0 0;
      width: 90px;
    }

    /* Rang 1 — Or avec animation */
    .rank-1 .podium-avatar { width: 90px; height: 90px; background: #FFD700; font-size: 1.8rem; }
    .rank-1 .podium-score { color: #FFD700; font-size: 1.8rem; }
    .rank-1 .podium-block { background: #FFD700; height: 100px; }
    .rank-1 .podium-name { font-size: 1.2rem; }
    .rank-1 { animation: pulse-gold 2s ease-in-out infinite; }
    @keyframes pulse-gold {
      0%, 100% { filter: drop-shadow(0 0 8px #FFD700); }
      50% { filter: drop-shadow(0 0 20px #FFD700); }
    }

    /* Rang 2 — Argent */
    .rank-2 .podium-avatar { width: 72px; height: 72px; background: #C0C0C0; }
    .rank-2 .podium-score { color: #C0C0C0; }
    .rank-2 .podium-block { background: #C0C0C0; height: 70px; }

    /* Rang 3 — Bronze */
    .rank-3 .podium-avatar { width: 60px; height: 60px; background: #CD7F32; }
    .rank-3 .podium-score { color: #CD7F32; }
    .rank-3 .podium-block { background: #CD7F32; height: 50px; }

    /* Tableau positions 4–10 */
    .lb-table-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }
    .lb-row {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      margin-bottom: 10px;
      padding: 14px 20px;
      gap: 16px;
      transition: background 0.2s;
    }
    .lb-row:hover { background: rgba(255,255,255,0.08); }
    .lb-rang {
      font-size: 1.3rem;
      font-weight: 700;
      color: #7FAACC;
      min-width: 40px;
      text-align: center;
    }
    .lb-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #1E3A5F;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1rem;
      color: #7FAACC;
      flex-shrink: 0;
    }
    .lb-name {
      flex: 1;
      font-size: 1.05rem;
      font-weight: 600;
    }
    .lb-score {
      font-size: 1.2rem;
      font-weight: 700;
      color: #7FCCFF;
      min-width: 90px;
      text-align: right;
    }
    .lb-badge {
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Anonymisés */
    .lb-row.anon { opacity: 0.4; }

    /* Badges niveaux */
    .badge-expert   { background: #FFD700; color: #000; }
    .badge-gardien  { background: #1A7F5A; color: #fff; }
    .badge-vigilant { background: #2E6DA4; color: #fff; }
    .badge-debuta, .badge-debutant { background: #555; color: #fff; }

    /* Séparateur podium / tableau */
    .section-sep {
      max-width: 800px; margin: 10px auto 20px;
      border: none; border-top: 1px solid rgba(255,255,255,0.1);
    }

    /* Spinner loader */
    #loader {
      text-align: center;
      padding: 60px;
      color: #446688;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

<div class="lb-header">
  <div class="lb-shield">🛡</div>
  <div class="lb-title">CyberScore</div>
  <div class="lb-subtitle">{{ company_name }} — Classement Cybersécurité</div>
  <div class="lb-updated" id="updatedAt">Chargement…</div>
  <div style="margin-top:10px;">
    <a href="/regles" style="color:#7FAACC;font-size:13px;text-decoration:none;opacity:.8;">&#128214; Règles du jeu &amp; barème de points</a>
  </div>
</div>

<div id="loader">Chargement du classement…</div>
<div id="leaderboardContent" style="display:none"></div>

<script>
function esc(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(str || ''));
  return d.innerHTML;
}

const BADGE_CLASSES = {
  'Expert':   'badge-expert',
  'Gardien':  'badge-gardien',
  'Vigilant': 'badge-vigilant',
  'Débutant': 'badge-debuta',
};

function initials(prenom, nom) {
  if (!prenom && !nom) return '?';
  return (prenom ? prenom[0] : '') + (nom ? nom[0] : '');
}

function renderPodiumItem(u, rankClass) {
  if (!u) return '';
  const isAnon = !u.nom || u.nom.startsWith('Collaborateur');
  return `
    <div class="podium-item ${rankClass}">
      <div class="podium-avatar">${isAnon ? '#' + u.rang : esc(initials(u.prenom, u.nom))}</div>
      <div class="podium-name">${u.prenom ? esc(u.prenom) + '<br>' : ''}${esc(u.nom)}</div>
      <div class="podium-score">${u.score} pts</div>
      <div class="podium-niveau lb-badge ${BADGE_CLASSES[u.niveau] || 'badge-debuta'}">${esc(u.niveau)}</div>
      <div class="podium-block">${u.rang === 1 ? '🥇' : u.rang === 2 ? '🥈' : '🥉'}</div>
    </div>
  `;
}

function render(data) {
  const top3 = data.slice(0, 3);
  const rest  = data.slice(3);

  // Podium : ordre visuel 2-1-3
  const ordered = [top3[1], top3[0], top3[2]].filter(Boolean);
  const podiumHTML = ordered.map(u => {
    const cls = `rank-${u.rang}`;
    return renderPodiumItem(u, cls);
  }).join('');

  const rowsHTML = rest.map(u => {
    const isAnon = !u.nom || u.nom.startsWith('Collaborateur');
    return `
      <div class="lb-row ${isAnon ? 'anon' : ''}">
        <div class="lb-rang">#${u.rang}</div>
        <div class="lb-avatar">${isAnon ? '?' : esc(initials(u.prenom, u.nom))}</div>
        <div class="lb-name">${u.prenom ? esc(u.prenom) + ' ' : ''}${esc(u.nom)}</div>
        <div class="lb-badge ${BADGE_CLASSES[u.niveau] || 'badge-debuta'}">${esc(u.niveau)}</div>
        <div class="lb-score">${u.score} pts</div>
      </div>
    `;
  }).join('');

  document.getElementById('leaderboardContent').innerHTML = `
    <div class="podium">${podiumHTML}</div>
    <hr class="section-sep">
    <div class="lb-table-container">${rowsHTML}</div>
  `;
  document.getElementById('leaderboardContent').style.display = '';
  document.getElementById('loader').style.display = 'none';
  document.getElementById('updatedAt').textContent =
    'Mis à jour le ' + new Date().toLocaleTimeString('fr-FR');
}

async function loadLeaderboard() {
  try {
    const resp = await fetch('/api/leaderboard');
    const data = await resp.json();
    render(data);
  } catch(e) {
    document.getElementById('loader').textContent = 'Erreur de chargement — nouvelle tentative dans 30s';
  }
}

// Chargement initial + refresh toutes les 60s
loadLeaderboard();
setInterval(loadLeaderboard, 60000);
</script>
</body>
</html>
