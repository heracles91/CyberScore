<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberScore — Connexion</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-logo">🛡</div>
    <h1 class="login-title">CyberScore</h1>
    <p class="login-subtitle">Administration DSI</p>

    {% if error %}
      <div class="flash flash-error">{{ error }}</div>
    {% endif %}

    <form method="POST" class="login-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="username">Identifiant</label>
        <input type="text" id="username" name="username" autocomplete="username"
               required autofocus placeholder="admin">
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" autocomplete="current-password"
               required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Connexion</button>
    </form>
  </div>
</body>
</html>
